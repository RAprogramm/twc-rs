service.desc.projects:
  en: "Projects group your resources — servers, databases, apps — by product or team: access control and cost tracking in one place."
  ru: "Проекты группируют ресурсы — серверы, базы, приложения — по продукту или команде: доступы и учёт затрат в одном месте."
