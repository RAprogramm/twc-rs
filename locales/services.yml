  ru: "Пока пусто — нажмите Enter на кнопке выше, чтобы создать."
service.desc.ssh_keys:
  en: "SSH keys stored in your account: attach one to a server to log in without a password."
  ru: "SSH-ключи аккаунта: подключите ключ к серверу, чтобы входить без пароля."
