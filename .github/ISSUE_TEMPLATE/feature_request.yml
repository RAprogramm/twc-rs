name: Feature request
description: Suggest a new command, flag, or improvement
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that twc-rs does not support today?
      placeholder: I want to manage ... but there is no command for it.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the command, flag, or behavior you would like.
      placeholder: Add `twc-rs <group> <action>` that ...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have tried.
    validations:
      required: false
