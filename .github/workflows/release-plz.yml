name: Release-plz

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'RAprogramm' }}
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - name: Mint GitHub App token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_PLZ_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Run release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'RAprogramm' }}
    needs: release-plz-release
    timeout-minutes: 30
    steps:
      - name: Mint GitHub App token
        id: app_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_PLZ_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - name: Run release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ steps.app_token.outputs.token }}
      - name: Enable auto-merge on the release PR
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          pr=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open \
            --json number,headRefName \
            --jq '[.[] | select(.headRefName | startswith("release-plz-"))][0].number // empty')
          if [ -n "$pr" ]; then
            gh pr merge --auto --squash "$pr" --repo "$GITHUB_REPOSITORY"
            echo "auto-merge enabled on release PR #$pr"
          else
            echo "no open release PR"
          fi
