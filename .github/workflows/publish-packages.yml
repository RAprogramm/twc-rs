name: Publish packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (e.g. v0.2.1)"
        required: true
        type: string
      pkgrel:
        description: "Package release number (bump when republishing the same version)"
        required: false
        default: "1"
        type: string

permissions:
  contents: read

jobs:
  aur:
    name: Publish AUR (twc-rs-bin)
    runs-on: ubuntu-latest
    if: github.repository_owner == 'RAprogramm'
    steps:
      - name: Guard on AUR_SSH_PRIVATE_KEY
        id: guard
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: if [ -n "${AUR_SSH_PRIVATE_KEY}" ]; then echo "ok=true" >> "$GITHUB_OUTPUT"; fi
      - name: Checkout repository
        if: steps.guard.outputs.ok == 'true'
        uses: actions/checkout@v7 # pinned to major tag
      - name: Resolve tag and version
        if: steps.guard.outputs.ok == 'true'
        id: meta
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          tag="${INPUT_TAG:-${RELEASE_TAG}}"
          version="${tag#v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Update PKGBUILD pkgver and sha256sums
        if: steps.guard.outputs.ok == 'true'
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          PKGREL: ${{ github.event.inputs.pkgrel || '1' }}
        run: |
          set -euo pipefail
          archive="twc-rs-${TAG}-x86_64-unknown-linux-gnu"
          url="https://github.com/RAprogramm/twc-rs/releases/download/${TAG}/${archive}.sha256"
          license_checksum="$(curl -fsSL "https://raw.githubusercontent.com/RAprogramm/twc-rs/${TAG}/LICENSE" | sha256sum | awk '{print $1}')"
          # The Release workflow builds and uploads the binaries in parallel with
          # this job, so the .sha256 asset may not exist yet. Wait for it instead
          # of failing on the race.
          checksum=""
          for attempt in $(seq 1 40); do
            if checksum="$(curl -fsSL "${url}" | awk '{print $1}')" && [ -n "${checksum}" ]; then
              break
            fi
            echo "checksum asset not ready yet (attempt ${attempt}/40); waiting..."
            checksum=""
            sleep 20
          done
          if [ -z "${checksum}" ]; then
            echo "::error::Could not read checksum from ${url} after waiting"
            exit 1
          fi
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" packaging/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=${PKGREL}/" packaging/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${checksum}' '${license_checksum}')/" packaging/PKGBUILD
          cat packaging/PKGBUILD
      - name: Publish to AUR
        if: steps.guard.outputs.ok == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@084b0d9b15415bf9cdb65d44dad1efe37a354050 # v4.2.0
        with:
          pkgname: twc-rs-bin
          pkgbuild: ./packaging/PKGBUILD
          commit_username: RAprogramm
          commit_email: andrey.rozanov.vl@gmail.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ steps.meta.outputs.tag }}"
