[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
# proc-macro-error2 is an unmaintained-only advisory (no security impact); it is
# a build-time proc-macro pulled transitively by tabled_derive and cannot be
# removed until tabled drops it. Revisit when tabled updates.
ignore = ["RUSTSEC-2026-0173"]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow = []
deny = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
