[package]
name = "twc-rs"
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
description = "Professional CLI tool for managing Timeweb Cloud infrastructure"
license = "MIT"
repository = "https://github.com/RAprogramm/twc-rs"
homepage = "https://github.com/RAprogramm/twc-rs"
readme = "README.md"
keywords = ["timeweb", "cloud", "cli"]
categories = ["command-line-utilities"]

[[bin]]
name = "twc-rs"
path = "src/main.rs"

[dependencies]
timeweb-rs = "0.1"
clap = { version = "4", features = ["derive", "env", "string"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
dirs = "5"
tabled = "0.16"
indicatif = "0.17"
colored = "2"
dialoguer = "0.11"

[dev-dependencies]
assert_cmd = "2"
predicates = "3"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
